- name: Inspect + Commit and push partners-data.json
        run: |
          echo "PWD: $(pwd)"
          echo "Listing repo root:"
          ls -la
          echo "partners-data.json exists?"
          test -f partners-data.json && echo "YES" || echo "NO"

          git status --porcelain
          git diff --stat
          git ls-files partners-data.json || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add partners-data.json
          git status --porcelain

          git commit -m "chore: update partners-data.json" || echo "No changes to commit"
          git push
