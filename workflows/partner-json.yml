name: Update partners-data.json

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch partners and generate JSON
        run: node scripts/update-partners-json.mjs

      - name: Commit and push (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet partners-data.json; then
            echo "No changes to partners-data.json"
            exit 0
          fi
          git add partners-data.json
          git commit -m "chore: update partners-data.json"
          git push